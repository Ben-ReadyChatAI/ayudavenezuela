server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml+rss;

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # immutable, content-hashed build assets — cache forever
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # other static assets (logo, favicon, etc.)
    location ~* \.(svg|png|jpg|jpeg|gif|webp|woff2?|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # html / routes — serve directory-format pages, fall back to 404 page
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    error_page 404 /404.html;
    # never let a transient deploy-window 404 (e.g. a hashed asset) get cached by the CDN
    location = /404.html { internal; add_header Cache-Control "no-store" always; }
}
